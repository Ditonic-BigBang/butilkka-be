spring.application.name=butilkka-be

spring.config.import=optional:classpath:application-secret.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/butilkka?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway (schema/mock data are seeded via migrations for local and prod alike)
spring.flyway.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT
jwt.secret=${JWT_SECRET:butilkka-be-dev-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=1800000
jwt.refresh-expiration=604800000

# Kakao OAuth
kakao.client-id=${KAKAO_CLIENT_ID:}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8080/api/v1/auth/kakao/callback}

# Frontend
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cookie.secure=${COOKIE_SECURE:false}

# AI Server
ai.server.url=${AI_SERVER_URL:http://3.38.26.1:8000}
ai.server.timeout=${AI_SERVER_TIMEOUT:60000}