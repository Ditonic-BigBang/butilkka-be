spring.application.name=butilkka-be

spring.config.import=optional:classpath:application-secret.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/butilkka?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Flyway (disabled locally — enabled in production via env var)
spring.flyway.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT
jwt.secret=${JWT_SECRET:butilkka-be-dev-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=1800000
jwt.refresh-expiration=604800000