spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

spring.docker.compose.enabled=false
spring.flyway.enabled=false

jwt.secret=test-secret-key-for-unit-tests-only-must-be-32chars
jwt.expiration=1800000
jwt.refresh-expiration=604800000

kakao.client-id=test-kakao-client-id
kakao.client-secret=test-kakao-client-secret
kakao.redirect-uri=http://localhost:8080/api/v1/auth/kakao/callback

app.frontend-url=http://localhost:3000
